name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/worker.js'
      - 'cloudflare-worker.js'
      - 'wrangler.jsonc'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Check Cloudflare deploy secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing GitHub Actions secret CLOUDFLARE_API_TOKEN. Add a Cloudflare API token with Workers Scripts edit access to the repository secrets."
            exit 1
          fi
      - name: Deploy ilios-image-handler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:worker
